name: Build and Deploy React+Vite to gh-pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Vite Project
        run: npm run build

      - name: Deploy Compiled Files to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite automatically outputs files to this folder
          branch: gh-pages
