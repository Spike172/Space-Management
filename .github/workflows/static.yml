name: Build and Deploy Subfolder React+Vite to gh-pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  # ⚠️ Change this to your exact frontend folder name!
  FRONTEND_DIR: 'space-frontend' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './${{ env.FRONTEND_DIR }}/package-lock.json'

      - name: Install Dependencies
        working-directory: ./${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build Vite Project
        working-directory: ./${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Deploy Compiled Files to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ${{ env.FRONTEND_DIR }}/dist
          branch: gh-pages
